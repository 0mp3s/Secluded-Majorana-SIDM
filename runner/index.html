<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pipeline Runner — Secluded Majorana SIDM</title>
<style>
  /* ── reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --surface2:  #22263a;
    --border:    #2e3354;
    --text:      #d4d8f0;
    --text-dim:  #6b7099;
    --accent:    #5c7cfa;
    --accent-dim:#3a5bd9;
    --green:     #40c057;
    --yellow:    #fab005;
    --red:       #fa5252;
    --running:   #74c0fc;
    --font-mono: 'Consolas', 'Courier New', monospace;
    --font-ui:   'Segoe UI', system-ui, sans-serif;
    --radius:    8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar h1 { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
  .topbar h1 span { color: var(--accent); }

  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--text-dim);
    transition: background .3s;
  }
  .status-dot.running  { background: var(--running); box-shadow: 0 0 6px var(--running); }
  .status-dot.paused   { background: var(--yellow); }
  .status-dot.done     { background: var(--green); }
  .status-dot.failed   { background: var(--red); }

  .status-label { font-size: 13px; color: var(--text-dim); min-width: 80px; }

  .btn {
    padding: 6px 16px;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .35; cursor: not-allowed; }

  .btn-run    { background: var(--accent);  color: #fff; }
  .btn-pause  { background: var(--yellow);  color: #111; }
  .btn-resume { background: var(--green);   color: #111; }
  .btn-stop   { background: var(--red);     color: #fff; }

  .btn-help {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
    flex-shrink: 0;
  }
  .btn-help:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── help modal ── */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; animation: fadeIn .15s ease; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: min(680px, 94vw);
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  .modal-head {
    display: flex;
    align-items: center;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-shrink: 0;
  }
  .modal-head h2 { flex: 1; font-size: 15px; color: var(--text); }
  .modal-lang-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .modal-lang-toggle button {
    padding: 4px 12px;
    font-size: 12px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: background .12s, color .12s;
  }
  .modal-lang-toggle button.active {
    background: var(--accent);
    color: #fff;
  }
  .modal-close {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--red); color: #fff; border-color: var(--red); }
  .modal-body {
    padding: 20px 24px;
    overflow-y: auto;
  }
  .help-section {
    margin-bottom: 20px;
  }
  .help-section h3 {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .help-section ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .help-section li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }
  .help-section li .hi {
    flex-shrink: 0;
    min-width: 22px;
    text-align: center;
    font-size: 14px;
  }
  .help-dot-demo {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 50%;
    vertical-align: middle;
    margin-right: 2px;
  }
  .help-section p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .help-kbd {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text);
  }

  .select-all-wrap { display: flex; align-items: center; gap: 6px; }
  .select-all-wrap label { font-size: 12px; color: var(--text-dim); cursor: pointer; }

  /* ── layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── left: step list ── */
  .sidebar {
    width: 380px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-search {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-search input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 10px;
    color: var(--text);
    font-size: 13px;
  }
  .sidebar-search input:focus { outline: none; border-color: var(--accent); }

  .step-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }

  /* ── stage group ── */
  .stage-group { margin-bottom: 2px; }

  .stage-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    cursor: pointer;
    user-select: none;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .stage-header:hover { background: #272b40; }
  .stage-chevron { font-size: 10px; color: var(--text-dim); transition: transform .2s; }
  .stage-header.collapsed .stage-chevron { transform: rotate(-90deg); }
  .stage-name { font-weight: 600; font-size: 12px; color: var(--text-dim); flex: 1; text-transform: uppercase; letter-spacing: .5px; }
  .stage-count { font-size: 11px; color: var(--text-dim); }

  .stage-cb { display: flex; align-items: center; }
  .stage-cb input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }

  .stage-steps { padding: 0; }
  .stage-steps.hidden { display: none; }

  /* ── step row ── */
  .step-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px 6px 28px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .15s, border-color .15s;
  }
  .step-row:hover { background: rgba(92,124,250,.06); }
  .step-row.active {
    background: rgba(116,192,252,.1);
    border-left-color: var(--running);
  }
  .step-row.done-ok  { border-left-color: var(--green); }
  .step-row.done-fail{ border-left-color: var(--red); }

  .step-cb input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }

  .step-order {
    font-size: 11px;
    color: var(--text-dim);
    width: 22px;
    text-align: right;
    flex-shrink: 0;
  }
  .step-label { flex: 1; font-size: 13px; color: var(--text); word-break: break-all; }
  .step-label.active { color: var(--running); font-weight: 600; }

  .step-warn { font-size: 11px; color: var(--yellow); flex-shrink: 0; }
  .step-section { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }

  .stale-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background .2s;
  }
  .stale-dot.fresh { background: var(--green); }
  .stale-dot.stale { background: var(--yellow); }
  .stale-dot.unrun { background: var(--text-dim); opacity: .5; }

  .btn-run-single {
    opacity: 0;
    transition: opacity .15s;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 11px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .step-row:hover .btn-run-single { opacity: 1; }
  .btn-run-single:hover { filter: brightness(1.2); }

  .spin {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--running);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── right: detail pane ── */
  .detail {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .detail-header {
    padding: 12px 20px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }
  .detail-header h2 { font-size: 14px; color: var(--running); font-weight: 600; }
  .detail-header .meta { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
  .detail-header .missing-warn {
    margin-top: 6px;
    font-size: 12px;
    color: var(--yellow);
    background: rgba(250,176,5,.1);
    border: 1px solid rgba(250,176,5,.3);
    border-radius: 4px;
    padding: 4px 8px;
  }

  /* progress bar */
  .progress-wrap {
    padding: 8px 20px 0;
    flex-shrink: 0;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .progress-bar-bg {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
  }
  .progress-bar-fill {
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
    transition: width .4s ease;
  }

  /* ── terminal output ── */
  .output-wrap {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: row;
    gap: 0;
    padding: 0 0 12px 20px;
    margin-top: 10px;
    min-height: 0;
  }

  .output-terminal {
    flex: 1;
    overflow-y: auto;
    background: #0a0c14;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    min-width: 0;
  }
  .output-terminal .line-ok  { color: #c5d4f6; }
  .output-terminal .line-err { color: var(--red); }

  /* ── images panel ── */
  .images-panel {
    width: 0;
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: width .28s ease, padding .28s ease, border-color .28s ease;
    border-left: 1px solid transparent;
    padding: 0;
    box-sizing: border-box;
  }
  .images-panel.has-images {
    width: 440px;
    overflow-y: auto;
    border-left-color: var(--border);
    padding: 0 16px 0 14px;
  }
  .images-panel-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .06em;
    flex-shrink: 0;
    padding-top: 2px;
    margin-bottom: 4px;
  }
  .img-script-divider {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    margin-top: 6px;
  }
  .img-script-divider::before {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .img-script-name {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    font-family: var(--font-mono);
  }
  .img-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    width: 100%;
    flex-shrink: 0;
  }
  .img-card img { width: 100%; display: block; }
  .img-card .img-name {
    padding: 4px 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ── toast notifications ── */
  .toasts {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
  }
  .toast {
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    animation: fadeIn .2s ease;
    max-width: 380px;
  }
  .toast.success { background: rgba(64,192,87,.2); border: 1px solid var(--green); color: var(--green); }
  .toast.error   { background: rgba(250,82,82,.2); border: 1px solid var(--red);   color: var(--red); }
  .toast.info    { background: rgba(92,124,250,.2); border: 1px solid var(--accent); color: var(--accent); }
  .toast.warn    { background: rgba(250,176,5,.2); border: 1px solid var(--yellow); color: var(--yellow); }
  @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; } }

  /* scrollbars */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ── top bar ── -->
<div class="topbar">
  <h1>Pipeline Runner &mdash; <span>Secluded Majorana SIDM</span></h1>
  <div class="status-dot" id="statusDot"></div>
  <span class="status-label" id="statusLabel">Ready</span>

  <div class="select-all-wrap">
    <input type="checkbox" id="cbAll" onchange="toggleAll(this.checked)">
    <label for="cbAll">Select all</label>
  </div>

  <button class="btn btn-run"    id="btnRun"    onclick="startRun()">▶ Run Selected</button>
  <button class="btn btn-pause"  id="btnPause"  onclick="sendCmd('pause')"  disabled>⏸ Pause</button>
  <button class="btn btn-resume" id="btnResume" onclick="sendCmd('resume')" disabled style="display:none">▶ Resume</button>
  <button class="btn btn-stop"   id="btnStop"   onclick="sendCmd('stop')"   disabled>⏹ Stop</button>
  <button class="btn-help" onclick="openHelp()" title="Help">?</button>
</div>

<!-- ── help modal ── -->
<div class="modal-backdrop" id="helpBackdrop" onclick="closeHelpOutside(event)">
  <div class="modal">
    <div class="modal-head">
      <h2 id="helpTitle">How to use Pipeline Runner</h2>
      <div class="modal-lang-toggle">
        <button id="btnLangHe" onclick="setHelpLang('he')">עברית</button>
        <button id="btnLangEn" onclick="setHelpLang('en')" class="active">English</button>
      </div>
      <button class="modal-close" onclick="closeHelp()">✕</button>
    </div>
    <div class="modal-body" id="helpBody"></div>
  </div>
</div>

<!-- ── main layout ── -->
<div class="layout">

  <!-- sidebar -->
  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="searchBox" placeholder="Filter scripts…" oninput="filterSteps(this.value)">
    </div>
    <div class="step-list" id="stepList"></div>
  </div>

  <!-- detail pane -->
  <div class="detail">
    <div class="detail-header">
      <div id="currentScript" style="color:var(--text-dim);font-size:13px;">Select scripts and press Run</div>
      <div class="meta" id="currentMeta"></div>
      <div class="missing-warn" id="missingWarn" style="display:none"></div>
    </div>

    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-label">
        <span id="progressText">0 / 0</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="output-wrap">
      <div class="output-terminal" id="terminal"></div>
      <div class="images-panel" id="imagesPanel">
        <div class="images-panel-label">Images</div>
      </div>
    </div>
  </div>

</div>

<!-- toasts container -->
<div class="toasts" id="toasts"></div>

<script>
// ── state ──────────────────────────────────────────────────────────────────
let ws;
let pipeline = [];           // [{order, stage, label, ...}]
let stageCollapsed = {};     // stageName → bool
let stepStatus = {};         // order → 'running'|'ok'|'fail'
let totalSelected = 0;
let doneCount = 0;

// ── WebSocket ──────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onopen = () => {
    console.log('WS connected');
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMsg(msg);
  };

  ws.onclose = () => {
    setTimeout(connectWS, 2000);   // auto-reconnect
  };
}

function sendCmd(cmd, extra = {}) {
  ws.send(JSON.stringify({ cmd, ...extra }));
}

// ── message handler ────────────────────────────────────────────────────────
function handleMsg(msg) {
  switch (msg.type) {

    case 'state':
      updateControls(msg);
      break;

    case 'pipeline':
      pipeline = msg.steps;
      renderPipeline();
      break;

    case 'step_start':
      stepStatus[msg.order] = 'running';
      renderStepStatus(msg.order);
      updateCurrentScript(msg);
      appendOutput(`\n── Running: ${msg.label} (step ${msg.order}) ──\n`, false);
      if (msg.missing && msg.missing.length) {
        warnMissing(msg.missing);
      } else {
        document.getElementById('missingWarn').style.display = 'none';
      }
      break;

    case 'output':
      appendOutput(msg.text + '\n', msg.err);
      break;

    case 'step_done':
      stepStatus[msg.order] = msg.rc === 0 ? 'ok' : 'fail';
      renderStepStatus(msg.order);
      if (msg.rc === 0) {
        doneCount++;
        updateProgress();
        appendOutput(`✓ Done (exit 0)\n`, false);
        if (msg.images && msg.images.length) {
          const stepObj2 = pipeline.find(s => s.order === msg.order);
          loadImages(msg.images, stepObj2 ? stepObj2.label : null);
        }
        const stepObj = pipeline.find(s => s.order === msg.order);
        if (stepObj) {
          const now = new Date();
          stepObj.last_run_at = now.toISOString().slice(0, 16).replace('T', ' ');
          stepObj.input_stale = false;
          renderStaleDot(msg.order, stepObj);
        }
      }
      break;

    case 'failure':
      appendOutput(`✗ FAILED (exit ${msg.rc}) — pipeline paused\n`, true);
      toast(`Script failed with exit code ${msg.rc}. Resume or Stop.`, 'error');
      break;

    case 'done':
      appendOutput('\n══ Pipeline finished ══\n', false);
      toast('Pipeline complete!', 'success');
      updateProgress();
      break;
  }
}

// ── controls ───────────────────────────────────────────────────────────────
function updateControls(state) {
  const running = state.running;
  const paused  = state.paused;

  document.getElementById('btnRun').disabled    = running;
  document.getElementById('btnPause').disabled  = !running || paused;
  document.getElementById('btnStop').disabled   = !running;

  const btnResume = document.getElementById('btnResume');
  const btnPause  = document.getElementById('btnPause');
  if (paused && running) {
    btnPause.style.display  = 'none';
    btnResume.style.display = '';
    btnResume.disabled = false;
  } else {
    btnPause.style.display  = '';
    btnResume.style.display = 'none';
  }

  const dot   = document.getElementById('statusDot');
  const label = document.getElementById('statusLabel');
  dot.className = 'status-dot';
  if (running && !paused) { dot.classList.add('running'); label.textContent = 'Running'; }
  else if (paused)        { dot.classList.add('paused');  label.textContent = 'Paused'; }
  else                    { label.textContent = 'Idle'; }
}

function startRun() {
  const checked = [...document.querySelectorAll('.step-cb input:checked')]
    .map(cb => parseInt(cb.dataset.order));
  if (!checked.length) { toast('No scripts selected', 'warn'); return; }

  // clear terminal
  document.getElementById('terminal').innerHTML = '';
  const panel = document.getElementById('imagesPanel');
  panel.innerHTML = '<div class="images-panel-label">Images</div>';
  panel.classList.remove('has-images');
  stepStatus = {};
  doneCount  = 0;
  totalSelected = checked.length;
  updateProgress();
  document.getElementById('progressWrap').style.display = '';

  sendCmd('run', { orders: checked });
}

function runSingle(order) {
  document.getElementById('terminal').innerHTML = '';
  const panel = document.getElementById('imagesPanel');
  panel.innerHTML = '<div class="images-panel-label">Images</div>';
  panel.classList.remove('has-images');
  stepStatus    = {};
  doneCount     = 0;
  totalSelected = 1;
  document.getElementById('progressWrap').style.display = '';
  updateProgress();
  sendCmd('run', { orders: [order] });
}

// ── pipeline rendering ─────────────────────────────────────────────────────
function renderPipeline() {
  if (!pipeline.length) return;

  // group by stage
  const groups = {};
  for (const step of pipeline) {
    if (!groups[step.stage]) groups[step.stage] = [];
    groups[step.stage].push(step);
  }

  const list = document.getElementById('stepList');
  list.innerHTML = '';

  for (const [stageName, steps] of Object.entries(groups)) {
    const collapsed = stageCollapsed[stageName] ?? false;
    const allOrders = steps.map(s => s.order);

    const group = document.createElement('div');
    group.className = 'stage-group';
    group.dataset.stage = stageName;

    group.innerHTML = `
      <div class="stage-header${collapsed ? ' collapsed' : ''}" onclick="toggleStage('${CSS.escape(stageName)}')">
        <span class="stage-chevron">▾</span>
        <span class="stage-name">${stageName}</span>
        <span class="stage-count">${steps.length} scripts</span>
        <div class="stage-cb" onclick="event.stopPropagation()">
          <input type="checkbox" id="stcb_${CSS.escape(stageName)}" onchange="toggleStageCheck('${CSS.escape(stageName)}', this.checked)" checked>
        </div>
      </div>
      <div class="stage-steps${collapsed ? ' hidden' : ''}" id="sg_${CSS.escape(stageName)}">
        ${steps.map(s => renderStepRow(s)).join('')}
      </div>
    `;
    list.appendChild(group);
  }
}

function staleClass(step) {
  if (!step.last_run_at) return 'unrun';
  return step.input_stale ? 'stale' : 'fresh';
}
function staleTitle(step) {
  if (!step.last_run_at) return 'Never ran';
  const base = `Last ran: ${step.last_run_at}`;
  return step.input_stale ? `Stale — inputs changed since\n${base}` : `Up to date · ${base}`;
}
function renderStaleDot(order, step) {
  const dot = document.getElementById('stale_' + order);
  if (!dot) return;
  dot.className = 'stale-dot ' + staleClass(step);
  dot.title = staleTitle(step);
}

function renderStepRow(step) {
  const hasMissing = step.missing_inputs && step.missing_inputs.length > 0;
  const isLong     = step.is_long;
  const dotCls     = staleClass(step);
  const dotTip     = staleTitle(step);
  return `
    <div class="step-row" id="row_${step.order}" data-order="${step.order}"
         onclick="selectStep(${step.order})">
      <div class="step-cb" onclick="event.stopPropagation()">
        <input type="checkbox" class="step-cb-input" data-order="${step.order}" checked>
      </div>
      <span class="step-order">${step.order}</span>
      <span class="step-label" id="lbl_${step.order}">${step.label}</span>
      ${hasMissing ? `<span class="step-warn" title="Missing: ${step.missing_inputs.join(', ')}">⚠ input</span>` : ''}
      ${isLong     ? `<span class="step-warn" title="Long-running script">⏱</span>` : ''}
      <span class="stale-dot ${dotCls}" id="stale_${step.order}" title="${dotTip}"></span>
      <span class="step-section">${step.paper_section}</span>
      <button class="btn-run-single" onclick="event.stopPropagation(); runSingle(${step.order})" title="Run this script only">▶</button>
    </div>`;
}

function renderStepStatus(order) {
  const row = document.getElementById('row_' + order);
  const lbl = document.getElementById('lbl_' + order);
  if (!row) return;

  row.className = 'step-row';
  lbl.className = 'step-label';

  const st = stepStatus[order];
  if (st === 'running') {
    row.classList.add('active');
    lbl.classList.add('active');
    // add spinner if not present
    if (!row.querySelector('.spin')) {
      const spin = document.createElement('span');
      spin.className = 'spin';
      spin.id = 'spin_' + order;
      lbl.after(spin);
    }
  } else {
    const spin = document.getElementById('spin_' + order);
    if (spin) spin.remove();
    if (st === 'ok')   row.classList.add('done-ok');
    if (st === 'fail') row.classList.add('done-fail');
  }

  // scroll into view if running
  if (st === 'running') row.scrollIntoView({ block: 'nearest' });
}

// ── current script header ──────────────────────────────────────────────────
function updateCurrentScript(msg) {
  document.getElementById('currentScript').textContent = msg.label;
  document.getElementById('currentScript').style.color = 'var(--running)';
  document.getElementById('currentMeta').textContent =
    `${msg.stage}  ·  step ${msg.order}`;
}

// ── missing input warning ──────────────────────────────────────────────────
function warnMissing(files) {
  const w = document.getElementById('missingWarn');
  w.textContent = '⚠ Missing input: ' + files.join(', ');
  w.style.display = '';
}

// ── terminal output ────────────────────────────────────────────────────────
function appendOutput(text, isErr) {
  const term = document.getElementById('terminal');
  const span = document.createElement('span');
  span.className = isErr ? 'line-err' : 'line-ok';
  span.textContent = text;
  term.appendChild(span);
  term.scrollTop = term.scrollHeight;
}

// ── images ─────────────────────────────────────────────────────────────────
async function loadImages(paths, scriptLabel) {
  const panel = document.getElementById('imagesPanel');
  if (scriptLabel) {
    const div = document.createElement('div');
    div.className = 'img-script-divider';
    div.innerHTML = `<span class="img-script-name">${scriptLabel}</span>`;
    panel.appendChild(div);
  }
  for (const p of paths) {
    try {
      const res = await fetch(`/api/image?path=${encodeURIComponent(p)}`);
      if (!res.ok) continue;
      const { data } = await res.json();
      const card = document.createElement('div');
      card.className = 'img-card';
      card.innerHTML = `<img src="${data}" loading="lazy" alt="${p}"/>
                        <div class="img-name">${p.split('/').pop()}</div>`;
      panel.appendChild(card);
    } catch (_) {}
  }
  if (panel.querySelector('.img-card')) {
    panel.classList.add('has-images');
  }
}

// ── stage collapse ─────────────────────────────────────────────────────────
function toggleStage(stageName) {
  stageCollapsed[stageName] = !stageCollapsed[stageName];
  const header  = document.querySelector(`[data-stage="${stageName}"] .stage-header`);
  const content = document.getElementById('sg_' + stageName);
  if (!header || !content) return;
  if (stageCollapsed[stageName]) {
    header.classList.add('collapsed');
    content.classList.add('hidden');
  } else {
    header.classList.remove('collapsed');
    content.classList.remove('hidden');
  }
}

function toggleStageCheck(stageName, checked) {
  const group = document.querySelector(`[data-stage="${stageName}"]`);
  if (!group) return;
  group.querySelectorAll('.step-cb-input').forEach(cb => cb.checked = checked);
}

function toggleAll(checked) {
  document.querySelectorAll('.step-cb-input').forEach(cb => cb.checked = checked);
  document.querySelectorAll('[id^="stcb_"]').forEach(cb => cb.checked = checked);
}

// ── step detail (click on row) ─────────────────────────────────────────────
function selectStep(order) {
  const step = pipeline.find(s => s.order === order);
  if (!step) return;
  document.getElementById('currentScript').textContent = step.label;
  document.getElementById('currentScript').style.color = 'var(--text)';
  const staleMeta = step.last_run_at
    ? (step.input_stale ? `⚠ stale · ran ${step.last_run_at}` : `✓ fresh · ran ${step.last_run_at}`)
    : '● never ran';
  document.getElementById('currentMeta').textContent =
    `${step.stage}  ·  step ${step.order}  ·  ${step.paper_section}  ·  ${staleMeta}`;
  if (step.missing_inputs && step.missing_inputs.length) {
    warnMissing(step.missing_inputs);
  } else {
    document.getElementById('missingWarn').style.display = 'none';
  }
}

// ── progress ───────────────────────────────────────────────────────────────
function updateProgress() {
  if (!totalSelected) return;
  const pct = Math.round((doneCount / totalSelected) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${doneCount} / ${totalSelected}`;
  document.getElementById('progressPct').textContent  = pct + '%';
}

// ── filter ─────────────────────────────────────────────────────────────────
function filterSteps(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.step-row').forEach(row => {
    const label = row.querySelector('.step-label').textContent.toLowerCase();
    row.style.display = label.includes(q) ? '' : 'none';
  });
}

// ── toast ──────────────────────────────────────────────────────────────────
function toast(msg, type = 'info', ms = 4000) {
  const box = document.createElement('div');
  box.className = `toast ${type}`;
  box.textContent = msg;
  document.getElementById('toasts').appendChild(box);
  setTimeout(() => box.remove(), ms);
}

let helpLang = 'en';

function openHelp() {
  document.getElementById('helpBackdrop').classList.add('open');
  renderHelp();
}
function closeHelp() {
  document.getElementById('helpBackdrop').classList.remove('open');
}
function closeHelpOutside(e) {
  if (e.target === document.getElementById('helpBackdrop')) closeHelp();
}
function setHelpLang(lang) {
  helpLang = lang;
  document.getElementById('btnLangHe').classList.toggle('active', lang === 'he');
  document.getElementById('btnLangEn').classList.toggle('active', lang === 'en');
  renderHelp();
}
function renderHelp() {
  const data = HELP[helpLang];
  document.getElementById('helpTitle').textContent = data.title;
  const rtl = helpLang === 'he';
  const body = document.getElementById('helpBody');
  body.style.direction = rtl ? 'rtl' : 'ltr';
  body.innerHTML = data.sections.map(sec => `
    <div class="help-section">
      <h3>${sec.heading}</h3>
      <ul>${sec.items.map(it => `
        <li>
          <span class="hi">${it.icon}</span>
          <span>${it.text}</span>
        </li>`).join('')}
      </ul>
    </div>`).join('');
}

  const data = await res.json();
  pipeline = data.steps;
  renderPipeline();
  connectWS();
}
